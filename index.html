<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Anime Sorters</title>
  <style>
    :root{
      --bg:#0b0f14; --text:#e8eef7; --muted:#a7b3c7;
      --border:rgba(255,255,255,.12);
      --accent:#67e8f9; --accent2:#a78bfa;
      --shadow: 0 10px 35px rgba(0,0,0,.35);
      --radius: 16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:radial-gradient(1000px 600px at 15% 10%, rgba(167,139,250,.18), transparent 55%),
                 radial-gradient(900px 500px at 85% 20%, rgba(103,232,249,.14), transparent 55%),
                 var(--bg);
    }
    header{
      max-width:1200px; margin:0 auto; padding:22px 16px 10px;
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    h1{margin:0; font-size:20px; letter-spacing:.2px}
    .sub{color:var(--muted); font-size:13px}
    .wrap{max-width:1200px; margin:0 auto; padding:0 16px 18px;}
    .tabs{
      display:flex; gap:10px; flex-wrap:wrap;
      background:rgba(0,0,0,.18);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:10px;
      box-shadow: var(--shadow);
    }
    .tabBtn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      user-select:none;
      display:inline-flex; align-items:center; gap:8px;
    }
    .tabBtn[aria-selected="true"]{
      border-color:rgba(103,232,249,.45);
      background:linear-gradient(90deg, rgba(103,232,249,.18), rgba(167,139,250,.12));
    }
    .panel{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      background:rgba(0,0,0,.16);
    }
    .frame{
      width:100%;
      height: calc(100vh - 150px);
      border:0;
      display:none;
      background:transparent;
    }
    .frame.active{display:block;}
    .note{margin-top:10px; color:var(--muted); font-size:12px}
    @media (max-width: 520px){
      .frame{height: calc(100vh - 175px);}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Anime Sorters</h1>
      <div class="sub">Switch between the character sorter and anime sorter using the tabs.</div>
    </div>
  </header>

  <div class="wrap">
    <div class="tabs" role="tablist" aria-label="Sorter tabs">
      <button class="tabBtn" id="tab-characters" role="tab" aria-selected="true" aria-controls="frame-characters">
        Character sorter
      </button>
      <button class="tabBtn" id="tab-anime" role="tab" aria-selected="false" aria-controls="frame-anime">
        Anime sorter
      </button>
      <button class="tabBtn" id="tab-anime-tierlist" role="tab" aria-selected="false" aria-controls="frame-anime-tierlist">
        Anime Tier List
      </button>
    </div>

    <div class="panel">
      <!-- Keep these files in the same folder when you deploy:
           - character_sorter.html (original character sorter)
           - anime_sorter.html (anime sorter)
           - anime_tier_list.html (anime tier list)
           - sorter_hub.html (this file)
      -->
      <iframe class="frame active" id="frame-characters" title="Anime Character Sorter" src="character_sorter.html"></iframe>
      <iframe class="frame" id="frame-anime" title="Anime Sorter" src="anime_sorter.html"></iframe>
      <iframe class="frame" id="frame-anime-tierlist" title="Anime Tier List" src="anime_tier_list.html"></iframe>
    </div>

    <div class="note">
      Tip: If you host this on GitHub Pages/Netlify/etc, make sure all 3 HTML files are in the same directory so the iframe
      <span style="font-family:ui-monospace,Menlo,Consolas,monospace">src</span> paths resolve.
    </div>
  </div>

<script>
(() => {
  const tabs = [
    { btn: document.getElementById("tab-characters"), frame: document.getElementById("frame-characters") },
    { btn: document.getElementById("tab-anime"), frame: document.getElementById("frame-anime") },
    { btn: document.getElementById("tab-anime-tierlist"), frame: document.getElementById("frame-anime-tierlist") }
  ];

  function activate(idx){
    tabs.forEach((t, i) => {
      const active = i === idx;
      t.btn.setAttribute("aria-selected", active ? "true" : "false");
      t.frame.classList.toggle("active", active);
    });
    tabs[idx].btn.focus({preventScroll:true});
  }

  tabs[0].btn.addEventListener("click", () => activate(0));
  tabs[1].btn.addEventListener("click", () => activate(1));
  tabs[2].btn.addEventListener("click", () => activate(2));

})();
</script>
</body>
</html>
